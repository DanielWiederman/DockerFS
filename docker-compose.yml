services:
  # מסד הנתונים
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=myuser
      - POSTGRES_PASSWORD=mypassword
      - POSTGRES_DB=yad2_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:8.6.2-alpine
    container_name: my-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --requirepass yourpassword --appendonly yes
    restart: unless-stopped
  # שרת הבאקאנד (Node.js)
  backend:
    build: ./server
    ports:
      - "5000:5000"
    depends_on:
      - db
      - redis
      - mongodb
    volumes:
      - ./server:/app          # מסנכרן את הקוד
      - /app/node_modules
      - ./types:/types          # shared types
    environment:
      - DATABASE_URL=postgres://myuser:mypassword@db:5432/yad2_db
      - REDIS_URL=redis://:yourpassword@redis:6379 # חיבור לרדיס עם הסיסמה שהגדרת
      - MONGODB_URL=mongodb://mongodb:27017/mydb
      - PORT=5000

  # הפרונטאנד (React)
  frontend:
    build: ./front
    ports:
      - "5173:5173"
    depends_on:
      - backend
    stdin_open: true # מאפשר ל-React לעשות Hot Reload
    volumes:
      - ./front:/app           # מסנכרן את הפרונט
      - /app/node_modules      # מגן על הספריות של הפרונט
      - ./types:/types          # shared types
    environment:
      - REACT_APP_API_URL=http://localhost:5000

  mongodb:
    image: mongo:8.2.7
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  postgres_data:
   # זה מבטיח שהנתונים לא יימחקו כשתסגור את הדוקר
  redis_data:
   # זה מבטיח שהנתונים של Redis לא יימחקו כשתסגור את הדוקר
  mongo_data:
   # זה מבטיח שהנתונים של MongoDB לא יימחקו כשתסגור את הדוקר